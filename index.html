<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartinhas para Você 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#130608;--card:#26101a;--card2:#311525;--border:#5c2438;
  --rose:#f4a7b9;--roseDark:#c4647a;--muted:#b07585;--dimmed:#7a3a4a;--text:#faedef;
}
body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#2d0f1a 0%,var(--bg) 60%);font-family:'Lato',sans-serif;color:var(--text);overflow-x:hidden}
.hearts-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
@keyframes rise{0%{transform:translateY(110vh) rotate(0deg);opacity:0}5%{opacity:.5}95%{opacity:.15}100%{transform:translateY(-120px) rotate(20deg);opacity:0}}
.hp{position:absolute;bottom:-60px;animation:rise linear infinite}
#adminBar{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#3a0f1e,#5c2438,#3a0f1e);border-bottom:1px solid var(--rose);padding:.45rem 1rem;text-align:center;font-size:.78rem;color:var(--rose);z-index:100;display:none;letter-spacing:.04em}
#adminBar.on{display:block}
#adminBar button{margin-left:.8rem;background:transparent;border:1px solid var(--rose);color:var(--rose);padding:.15rem .7rem;border-radius:20px;cursor:pointer;font-size:.72rem;transition:all .2s}
#adminBar button:hover{background:var(--rose);color:var(--bg)}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem}
header{text-align:center;padding:3.5rem 0 2rem}
.halo{font-size:3rem;margin-bottom:.6rem;display:block;filter:drop-shadow(0 0 20px #f4a7b960)}
header h1{font-family:'Dancing Script',cursive;font-size:3.8rem;color:var(--rose);text-shadow:0 0 40px #f4a7b940;margin-bottom:.4rem;line-height:1.1}
header p{font-weight:300;color:var(--muted);font-size:.95rem;letter-spacing:.12em}
.sec{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--rose);text-align:center;margin:2.5rem 0 1.4rem;display:flex;align-items:center;gap:1rem;justify-content:center}
.sec::before,.sec::after{content:'';flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
.sec::after{background:linear-gradient(90deg,var(--border),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;margin-bottom:2rem}
.card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;padding:1.3rem 1rem 1.1rem;text-align:center;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative;overflow:hidden;user-select:none}
.card::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(244,167,185,.04),transparent);border-radius:18px;pointer-events:none}
.card:hover:not(.locked-state){transform:translateY(-5px);box-shadow:0 10px 30px rgba(244,167,185,.18);border-color:var(--rose)}
.card.unlocked-state{background:linear-gradient(145deg,#3a1525,#501b30);border-color:var(--roseDark);cursor:pointer}
.card.locked-state{opacity:.6;cursor:default}
.card.locked-state:hover{transform:none;box-shadow:none;border-color:var(--border)}
.card.admin-state{cursor:pointer;opacity:.85;border-style:dashed}
.card.admin-state:hover{opacity:1;transform:translateY(-3px);border-color:var(--rose)}
.card-icon{font-size:2.3rem;display:block;margin-bottom:.5rem;line-height:1}
.card-num{font-size:.65rem;color:var(--dimmed);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.2rem}
.card-date{font-size:.78rem;color:var(--muted);margin-bottom:.4rem;font-weight:300}
.card-lbl{font-size:.8rem;color:var(--text);line-height:1.35;min-height:2.2em}
.card-cd{font-size:.65rem;color:var(--dimmed);margin-top:.35rem}
.badge{display:inline-block;font-size:.58rem;padding:.12rem .5rem;border-radius:20px;margin-top:.45rem;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
.b-open{background:rgba(244,167,185,.18);color:var(--rose)}
.b-lock{background:rgba(92,36,56,.4);color:var(--dimmed)}
.b-empty{background:rgba(30,11,16,.6);color:var(--dimmed);border:1px dashed var(--border)}
.b-admin{background:rgba(196,100,122,.2);color:var(--roseDark)}
.sep{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:2rem 0}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,2,4,.88);backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.on{display:flex}
.modal{background:linear-gradient(160deg,#220d16,#311525);border:1px solid var(--border);border-radius:26px;padding:2.5rem 2.2rem;max-width:540px;width:100%;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 24px 70px rgba(0,0,0,.6)}
.modal-x{position:absolute;top:1rem;right:1.2rem;background:none;border:none;color:var(--dimmed);font-size:1.6rem;cursor:pointer;line-height:1;transition:color .2s}
.modal-x:hover{color:var(--rose)}
.m-icon{text-align:center;font-size:3.2rem;margin-bottom:.8rem}
.m-title{font-family:'Dancing Script',cursive;font-size:2.2rem;color:var(--rose);text-align:center;margin-bottom:.2rem}
.m-date{text-align:center;color:var(--dimmed);font-size:.82rem;margin-bottom:1.6rem;font-weight:300}
.letter-body{font-family:'Playfair Display',serif;font-style:italic;line-height:2;color:var(--text);white-space:pre-wrap;font-size:.98rem}
.letter-foot{text-align:center;margin-top:1.4rem;font-size:1.5rem}
.aform label{display:block;font-size:.7rem;color:var(--dimmed);text-transform:uppercase;letter-spacing:.1em;margin:.9rem 0 .3rem}
.aform input,.aform textarea{width:100%;background:rgba(8,2,4,.5);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;color:var(--text);font-family:'Lato',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;resize:vertical}
.aform input:focus,.aform textarea:focus{border-color:var(--rose)}
.aform textarea{min-height:200px}
.pwbox{max-width:340px;text-align:center}
.pwbox input{width:100%;background:rgba(8,2,4,.5);border:1px solid var(--border);border-radius:10px;padding:.75rem;color:var(--text);font-family:'Lato',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:.25em;margin:.8rem 0;transition:border-color .2s}
.pwbox input:focus{border-color:var(--rose)}
.pw-err{color:#c45a6a;font-size:.78rem;min-height:1.2em;margin-top:.2rem}
.btn{display:inline-block;padding:.65rem 1.4rem;border-radius:50px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.84rem;font-weight:700;letter-spacing:.04em;transition:all .2s;margin-top:.8rem}
.btn-p{background:linear-gradient(135deg,var(--roseDark),var(--rose));color:var(--bg)}
.btn-p:hover{opacity:.85;transform:translateY(-2px)}
.btn-s{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-s:hover{border-color:var(--rose);color:var(--rose)}
.btn-d{background:transparent;border:1px solid #7a2535;color:#c45a6a}
.btn-d:hover{background:#7a253522}
.btns{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem;align-items:center}
#key{position:fixed;bottom:1.2rem;right:1.2rem;width:38px;height:38px;border-radius:50%;background:rgba(92,36,56,.25);border:1px solid rgba(92,36,56,.5);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;z-index:50;transition:all .2s;opacity:.35}
#key:hover{opacity:1;background:rgba(92,36,56,.6)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
footer{text-align:center;padding:2rem 0 5rem;color:var(--dimmed);font-size:.72rem;font-weight:300;letter-spacing:.12em}
@media(max-width:600px){header h1{font-size:2.8rem}.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.modal{padding:1.8rem 1.4rem}}
</style>
</head>
<body>
<div class="hearts-bg" id="hbg"></div>
<div id="adminBar">
  ✏️ Modo Admin — clique em qualquer cartinha para escrever
  <button onclick="downloadJSON()">⬇️ Baixar cartas.json</button>
  <button onclick="exitAdmin()">Sair</button>
</div>
<div class="wrap" id="wrap">
  <header>
    <span class="halo">💌</span>
    <h1>Cartinhas para Você</h1>
    <p>um pouquinho de amor para cada semana</p>
  </header>
  <div class="sec">Cartinhas de Sábado</div>
  <div class="grid" id="satGrid"></div>
  <div class="sep"></div>
  <div class="sec">Cartinhas Especiais</div>
  <div class="grid" id="spGrid"></div>
  <footer>feito com muito amor 💕</footer>
</div>
<button id="key" onclick="handleKey()" title="Admin">🔑</button>
<div class="overlay" id="overlay"><div class="modal" id="mc"></div></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SAT_N = 28;
const SP_N  = 5;

function getSaturdays() {
  var r = [], y = 2026, m = 4, day = 9; // May 9 2026 (month 0-indexed)
  for (var i = 0; i < SAT_N; i++) {
    var d = new Date(y, m, day + i * 7);
    r.push(d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0'));
  }
  return r;
}
var SATS = getSaturdays();

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var isAdmin  = false;
var letters  = {};
var adminPw  = null;
var LS_KEY   = 'cl_v3';

// ═══════════════════════════════════════════════════════
// PASSWORD — simple numeric hash, browser-consistent
// ═══════════════════════════════════════════════════════
function hashPw(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) {
    h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  }
  return 'h_' + h;
}

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({letters: letters, adminPw: adminPw})); } catch(e) {}
}
function load() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) {
      var d = JSON.parse(raw);
      if (d.letters) letters = d.letters;
      if (d.adminPw) adminPw = d.adminPw;
    }
  } catch(e) {}
}
function freshFromStorage() {
  // Always re-read password from storage before comparing
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) {
      var d = JSON.parse(raw);
      if (d.adminPw) adminPw = d.adminPw;
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// DATE UTILS
// ═══════════════════════════════════════════════════════
function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-').map(Number);
  return new Date(p[0], p[1]-1, p[2]).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'});
}
function isOpen(s) {
  if (!s) return false;
  var p = s.split('-').map(Number);
  var t = new Date(p[0], p[1]-1, p[2]);
  var now = new Date(); now.setHours(0,0,0,0);
  return now >= t;
}
function countdown(s) {
  if (!s) return '';
  var p = s.split('-').map(Number);
  var t = new Date(p[0], p[1]-1, p[2]);
  var now = new Date(); now.setHours(0,0,0,0);
  var diff = Math.round((t - now) / 86400000);
  if (diff <= 0) return '';
  if (diff === 1) return 'Amanhã! 🌸';
  return 'em ' + diff + ' dias';
}

// ═══════════════════════════════════════════════════════
// ESCAPE
// ═══════════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
function escTA(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(html) {
  document.getElementById('mc').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('on');
}
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target.id === 'overlay') closeModal();
});

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  renderGrid('satGrid', 's',  SAT_N, SATS);
  renderGrid('spGrid',  'sp', SP_N,  null);
}

function renderGrid(id, prefix, n, dates) {
  var g = document.getElementById(id);
  g.innerHTML = '';
  for (var i = 0; i < n; i++) {
    var key     = prefix + '_' + i;
    var lt      = letters[key] || {};
    var defDate = dates ? dates[i] : null;
    var uDate   = lt.unlockDate || defDate || '';
    var hasCont = !!(lt.content && lt.content.trim() !== '');
    var opened  = hasCont && isOpen(uDate);
    var locked  = hasCont && !isOpen(uDate);

    var cls, icon, badge, badgeCls;
    if (isAdmin) {
      cls = 'card admin-state';
      icon = hasCont ? '📝' : '✉️';
      badge = hasCont ? 'Editar' : 'Escrever';
      badgeCls = 'b-admin';
    } else if (opened) {
      cls = 'card unlocked-state';
      icon = '💌'; badge = 'Abrir'; badgeCls = 'b-open';
    } else if (locked) {
      cls = 'card locked-state';
      icon = '🔒'; badge = 'Bloqueada'; badgeCls = 'b-lock';
    } else {
      cls = 'card locked-state';
      icon = '✉️'; badge = 'Em breve'; badgeCls = 'b-empty';
    }

    var lbl    = lt.label || (prefix === 's' ? 'Semana ' + (i+1) : 'Especial ' + (i+1));
    var numLbl = prefix === 's' ? 'Sábado ' + (i+1) : 'Especial ' + (i+1);
    var cd     = (!opened && !isAdmin && uDate) ? countdown(uDate) : '';

    var div = document.createElement('div');
    div.className = cls;
    div.innerHTML =
      '<span class="card-icon">' + icon + '</span>' +
      '<div class="card-num">'  + numLbl + '</div>' +
      '<div class="card-date">' + (uDate ? fmtDate(uDate) : '—') + '</div>' +
      '<div class="card-lbl">'  + esc(lbl) + '</div>' +
      (cd ? '<div class="card-cd">' + cd + '</div>' : '') +
      '<span class="badge ' + badgeCls + '">' + badge + '</span>';

    (function(k, px, idx, ud, hc, op, dd) {
      div.onclick = function() { cardClick(k, px, idx, ud, hc, op, dd); };
    })(key, prefix, i, uDate, hasCont, opened, defDate);

    g.appendChild(div);
  }
}

// ═══════════════════════════════════════════════════════
// CARD CLICK
// ═══════════════════════════════════════════════════════
function cardClick(key, prefix, i, uDate, hasCont, opened, defDate) {
  if (isAdmin)  { openAdminModal(key, prefix, i, defDate); return; }
  if (opened)   { openReadModal(key); return; }
  if (hasCont)  { openLockedModal(uDate); return; }
}

// ═══════════════════════════════════════════════════════
// READ MODAL
// ═══════════════════════════════════════════════════════
function openReadModal(key) {
  var lt = letters[key] || {};
  openModal(
    '<button class="modal-x" onclick="closeModal()">×</button>' +
    '<div class="m-icon">💌</div>' +
    '<div class="m-title">' + esc(lt.label || key) + '</div>' +
    '<div class="m-date">'  + (lt.unlockDate ? fmtDate(lt.unlockDate) : '') + '</div>' +
    '<div class="letter-body">' + escHtml(lt.content || '') + '</div>' +
    '<div class="letter-foot">💕</div>'
  );
}

// ═══════════════════════════════════════════════════════
// LOCKED MODAL
// ═══════════════════════════════════════════════════════
function openLockedModal(uDate) {
  var cd = countdown(uDate);
  openModal(
    '<button class="modal-x" onclick="closeModal()">×</button>' +
    '<div class="m-icon">🔒</div>' +
    '<div class="m-title">Ainda não!</div>' +
    '<div class="m-date">Esta cartinha abre em</div>' +
    '<div style="text-align:center;line-height:2;color:var(--muted)">' +
    '<strong style="color:var(--rose);font-size:1.3rem">' + fmtDate(uDate) + '</strong><br>' +
    (cd ? '<span style="color:var(--dimmed);font-size:.85rem">' + cd + '</span>' : '') +
    '</div>' +
    '<div style="text-align:center;margin-top:1.5rem;font-size:2rem">⏳</div>'
  );
}

// ═══════════════════════════════════════════════════════
// ADMIN WRITE MODAL
// ═══════════════════════════════════════════════════════
function openAdminModal(key, prefix, i, defDate) {
  var lt      = letters[key] || {};
  var lbl     = lt.label || (prefix === 's' ? 'Semana ' + (i+1) : 'Especial ' + (i+1));
  var uDate   = lt.unlockDate || defDate || '';
  var content = lt.content || '';
  var has     = content.trim() !== '';

  openModal(
    '<button class="modal-x" onclick="closeModal()">×</button>' +
    '<div class="m-icon">✏️</div>' +
    '<div class="m-title">Escrever Cartinha</div>' +
    '<div class="m-date">' + (prefix === 's' ? 'Sábado ' + (i+1) : 'Especial ' + (i+1)) + '</div>' +
    '<div class="aform">' +
    '<label>Nome / título da cartinha</label>' +
    '<input type="text" id="f-lbl" value="' + escAttr(lbl) + '" placeholder="Uma semana especial...">' +
    '<label>Data de desbloqueio</label>' +
    '<input type="date" id="f-date" value="' + escAttr(uDate) + '">' +
    '<label>Conteúdo da cartinha 💌</label>' +
    '<textarea id="f-content" placeholder="Escreva aqui com todo carinho...">' + escTA(content) + '</textarea>' +
    '</div>' +
    '<div class="btns">' +
    '<button class="btn btn-p" onclick="saveLetter(\'' + key + '\')">💾 Salvar</button>' +
    (has ? '<button class="btn btn-d" onclick="deleteLetter(\'' + key + '\')">🗑 Apagar</button>' : '') +
    '<button class="btn btn-s" onclick="closeModal()">Cancelar</button>' +
    '</div>'
  );
}

function saveLetter(key) {
  var lbl     = document.getElementById('f-lbl').value.trim();
  var date    = document.getElementById('f-date').value;
  var content = document.getElementById('f-content').value;
  if (!content.trim()) { alert('Escreva algo antes de salvar! 💕'); return; }
  letters[key] = {label: lbl || 'Cartinha', unlockDate: date, content: content, savedAt: new Date().toISOString()};
  save(); closeModal(); render();
}

function deleteLetter(key) {
  if (confirm('Apagar esta cartinha?')) {
    delete letters[key]; save(); closeModal(); render();
  }
}

// ═══════════════════════════════════════════════════════
// EXPORT — gera comando para colar no GitHub Pages
// ═══════════════════════════════════════════════════════
function downloadJSON() {
  var data = { letters: letters };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'cartas.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  openModal(
    '<button class="modal-x" onclick="closeModal()">\u00d7</button>' +
    '<div class="m-icon">\u2705</div>' +
    '<div class="m-title">cartas.json baixado!</div>' +
    '<div style="font-size:.82rem;color:var(--muted);line-height:1.9;margin-top:1rem">' +
    '1. Abre o reposit\u00f3rio <strong style="color:var(--rose)">cartinhas</strong> no GitHub<br>' +
    '2. Clica em <strong style="color:var(--rose)">cartas.json</strong> \u2192 \u00edcone do l\u00e1pis (Edit) ou \u201cUpload files\u201d<br>' +
    '3. Substitui pelo arquivo que acabou de baixar e faz <strong style="color:var(--rose)">Commit</strong><br>' +
    '4. Em ~1 min ela j\u00e1 v\u00ea as cartas atualizadas no celular \ud83d\udc95</div>' +
    '<div class="btns"><button class="btn btn-p" onclick="closeModal()">Entendi</button></div>'
  );
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
function handleKey() {
  if (isAdmin) { exitAdmin(); return; }
  freshFromStorage();
  if (!adminPw) { openSetPw(); } else { openLogin(); }
}

function openSetPw() {
  openModal(
    '<button class="modal-x" onclick="closeModal()">×</button>' +
    '<div class="pwbox" style="margin:0 auto">' +
    '<div class="m-icon">🔑</div>' +
    '<div class="m-title">Criar senha</div>' +
    '<div style="font-size:.82rem;color:var(--dimmed);margin-bottom:.5rem">Primeira vez! Crie sua senha secreta.</div>' +
    '<input type="password" id="pw1" placeholder="Nova senha" autocomplete="new-password">' +
    '<input type="password" id="pw2" placeholder="Confirmar senha" autocomplete="new-password" style="margin-top:.5rem">' +
    '<div id="pwe" class="pw-err"></div>' +
    '<button class="btn btn-p" style="width:100%;margin-top:.8rem" onclick="createPw()">Criar 💌</button>' +
    '</div>'
  );
}

function createPw() {
  var a = document.getElementById('pw1').value;
  var b = document.getElementById('pw2').value;
  var e = document.getElementById('pwe');
  if (a.length < 4) { e.textContent = 'Mínimo 4 caracteres.'; return; }
  if (a !== b)       { e.textContent = 'Senhas não coincidem.'; return; }
  adminPw = hashPw(a);
  save(); closeModal(); enterAdmin();
}

function openLogin() {
  openModal(
    '<button class="modal-x" onclick="closeModal()">×</button>' +
    '<div class="pwbox" style="margin:0 auto">' +
    '<div class="m-icon">🔑</div>' +
    '<div class="m-title">Modo Admin</div>' +
    '<input type="password" id="pw1" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')doLogin()">' +
    '<div id="pwe" class="pw-err"></div>' +
    '<button class="btn btn-p" style="width:100%;margin-top:.8rem" onclick="doLogin()">Entrar</button>' +
    '<div style="margin-top:.8rem"><button class="btn btn-s" style="font-size:.72rem;width:100%" onclick="resetPw()">Esqueci a senha</button></div>' +
    '</div>'
  );
  setTimeout(function() { var i = document.getElementById('pw1'); if (i) i.focus(); }, 100);
}

function doLogin() {
  var pw = document.getElementById('pw1').value;
  freshFromStorage(); // always read latest from storage
  if (hashPw(pw) === adminPw) { closeModal(); enterAdmin(); }
  else { document.getElementById('pwe').textContent = 'Senha incorreta. 💔'; }
}

function resetPw() {
  if (!confirm('Redefinir senha? As cartinhas NÃO serão apagadas.')) return;
  adminPw = null;
  save();
  closeModal();
  openSetPw();
}

function enterAdmin() {
  isAdmin = true;
  document.getElementById('adminBar').classList.add('on');
  document.getElementById('wrap').style.marginTop = '40px';
  render();
}
function exitAdmin() {
  isAdmin = false;
  document.getElementById('adminBar').classList.remove('on');
  document.getElementById('wrap').style.marginTop = '0';
  render();
}

// ═══════════════════════════════════════════════════════
function spawnHearts() {
  var bg = document.getElementById('hbg');
  var emojis = ['💗','💕','💖','💓','♥','💞','🌸'];
  for (var i = 0; i < 18; i++) {
    var h = document.createElement('div');
    h.className = 'hp';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (.7 + Math.random() * 1.3) + 'rem';
    h.style.animationDuration = (9 + Math.random() * 14) + 's';
    h.style.animationDelay = (Math.random() * 18) + 's';
    bg.appendChild(h);
  }
}

  if (window.__SEED__ && window.__SEED__.adminPw && !adminPw) adminPw = window.__SEED__.adminPw;
  load(); // sobrep\u00f5e com edi\u00e7\u00f5es locais salvas (PC admin)
}
function boot() {
  // 1) senha admin vem do localStorage/seed
  bootSeedFallback();
